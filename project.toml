<[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "sched_viz"
version = "0.1.0"
description = "Domain-agnostic scheduling solution visualization library"
requires-python = ">=3.11"
dependencies = [
    "plotly>=5.20",
    "pydantic>=2.0",
    "kaleido>=0.2",
]

[tool.setuptools.packages.find]
where = ["src"]
>